name: Allergyline
options:
  bundleIdPrefix: com.shimondeitel.allergyline
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Allergyline:
    type: application
    platform: iOS
    sources:
      - path: Allergyline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.allergyline
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Allergyline/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  AllergylineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AllergylineTests
      - path: Allergyline.storekit
    dependencies:
      - target: Allergyline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.allergyline.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  AllergylineUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AllergylineUITests
    dependencies:
      - target: Allergyline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.allergyline.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Allergyline:
    build:
      targets:
        Allergyline: all
        AllergylineTests: [test]
        AllergylineUITests: [test]
    test:
      targets:
        - AllergylineTests
        - AllergylineUITests
